<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.3.CSS-文字與段落_字型3</title>
    <style>
       /* CSS3後HTML允許使用@font-face指定遷入存放在伺服器的字型檔來顯示字型，目前支援的字型檔格式有:Web Open Font Format(.WOFF)、True Type(.ttf)、Open Type(.otf)，格式如下 */
       @font-face {
            font-family: TurretRoad;
            src: url('TurretRoad-Bold.ttf');
        }
        p {font-family: TurretRoad;}
    </style>
</head>
<body>
    <p>Bright moonlight before my bed, <br>
            I suppose it is frost on the ground. <br>I raise my head to view the bright moon, <br> Then lower it, thinking of my home village.</p>
</body>
</html>
