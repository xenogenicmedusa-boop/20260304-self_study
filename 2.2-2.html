<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.2.CSS-顏色與背景_線性漸層</title>
    <style>
        div {
            font-size: 15pt;
            text-align: center; color: aliceblue; padding: 20px; margin-bottom: 10px;
        }
        .linear1 { background: linear-gradient(to bottom, yellow, green);}
        .linear2 { background: linear-gradient(45deg, yellow, green);}
        .linear3 { background: linear-gradient(to right bottom, yellow, green);}
        .linear4 { background: linear-gradient(to left, yellow 30%, green 70%);}
        .linear5 { background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);}
    </style>
</head>
<body>
    <div class="linear1">向下漸層</div>
    <div class="linear2">指定角度漸層</div>
    <div class="linear3">對角線漸層</div>
    <div class="linear4">指定範圍漸層</div>
    <div class="linear5">多層漸層</div>
</body>
</html>
