<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poem</title>
    <link rel="stylesheet" href="test02.css">
</head>
<body>
    <div id="maindiv">
        <h1 class="poem">
            床前明月光，疑是地上霜。<br>舉頭望明月，低頭思故鄉。
        </h1>
        <p>
            月光鋪在床前的地上，<br>
        像是一層瑩白的濃霜。<br>
        抬頭晀望窗外的明月，<br>
        低頭思念久別的故鄉。<br>
        </p>
    </div>
</body>
</html>
