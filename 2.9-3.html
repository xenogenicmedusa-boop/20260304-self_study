<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.9.CSS-變形、轉換與動畫_分段執行轉換效果</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: lightblue;
            border: 1px dotted black;
            text-align: center;
            line-height: 100px;
            transition: 1s width ease 0s, 1s background-color ease 1s;
        }
        .box:hover{
            width: 400px;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="box">BOX</div>
    
</body>
</html>
